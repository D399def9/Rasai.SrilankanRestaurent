<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osteria Bricco — Order App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="staff-access-wrap">
  <button id="staffAccessBtn" class="staff-access-btn" onclick="openAdminGate()">Staff access</button>
</div>

<div class="admin-gate" id="adminGate" role="dialog" aria-modal="true" aria-label="Staff access">
  <div class="admin-gate-card">
    <h3>Staff access</h3>
    <p>Enter the password to open the admin panel.</p>
    <input id="adminPasswordInput" type="password" placeholder="Password">
    <div class="admin-gate-actions">
      <button class="secondary-btn" type="button" onclick="closeAdminGate()">Cancel</button>
      <button class="primary-btn" type="button" onclick="submitAdminPassword()">Enter</button>
    </div>
  </div>
</div>

<!-- ============ CUSTOMER APP ============ -->
<div class="stage" id="customerStage">
  <div class="phone">
    <div class="screen" id="screen"></div>
  </div>
</div>

<!-- ============ ADMIN PANEL ============ -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-nav">
    <div class="brand">Osteria Bricco</div>
    <div class="brand-sub">Staff panel</div>
    <button data-page="orders" class="admin-nav-btn active" onclick="setAdminPage('orders')"><span class="ic">🎫</span> Live orders</button>
    <button data-page="menu" class="admin-nav-btn" onclick="setAdminPage('menu')"><span class="ic">📋</span> Menu manager</button>
    <button data-page="customers" class="admin-nav-btn" onclick="setAdminPage('customers')"><span class="ic">👥</span> Customers</button>
    <button data-page="promos" class="admin-nav-btn" onclick="setAdminPage('promos')"><span class="ic">🏷️</span> Promotions</button>
  </div>
  <div class="admin-main" id="adminMain"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
