<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osteria Bricco — Order App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pine:#1E3A2E;
    --pine-deep:#152C22;
    --basil:#4C7A5D;
    --paper:#EFE6C8;
    --paper-light:#F8F3E3;
    --mustard:#E3A431;
    --mustard-deep:#C6841C;
    --tomato:#C1442D;
    --ink:#2A2420;
    --ink-soft:#5A5148;
    --line: rgba(42,36,32,0.14);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--pine-deep);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.03), transparent 40%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 34px);
    color: var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{ font-family:'Fraunces', serif; letter-spacing:-0.01em; }
  .mono{ font-family:'Space Mono', monospace; }
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  ::selection{ background: var(--mustard); color:var(--ink); }

  /* ---- Top-level shell: switch between Customer & Admin ---- */
  .shell-switch{
    position:fixed; top:14px; right:14px; z-index:500;
    display:flex; gap:6px; background:rgba(21,44,34,0.9); border:1px solid rgba(255,255,255,0.12);
    border-radius:999px; padding:4px; backdrop-filter: blur(6px);
  }
  .shell-switch button{
    border:none; background:transparent; color:var(--paper-light); font-size:12.5px; font-weight:600;
    padding:7px 14px; border-radius:999px; letter-spacing:.03em; text-transform:uppercase;
  }
  .shell-switch button.active{ background:var(--mustard); color:var(--ink); }

  /* ================= CUSTOMER APP (phone frame) ================= */
  .stage{ min-height:100vh; display:block; padding:0; }
  .phone{
    width:100%; max-width:480px; margin:0 auto; background:var(--paper-light);
    min-height:100vh; position:relative; overflow-x:hidden;
  }
  .screen{ min-height:100vh; height:100vh; height:100dvh; }
  .app-header{ background:var(--pine); color:var(--paper-light); padding:34px 20px 16px; position:relative; }
  .app-header .eyebrow{ font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--mustard); font-weight:700;}
  .app-header h1{ font-size:clamp(20px, 5vw, 26px); margin:4px 0 2px; color:#fff; }
  .app-header .sub{ font-size:12.5px; color:rgba(248,243,227,0.65); }
  .lang-toggle{ position:absolute; top:34px; right:20px; display:flex; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden;}
  .lang-toggle button{ border:none; background:transparent; color:rgba(255,255,255,0.6); font-size:11px; font-weight:700; padding:6px 10px;}
  .lang-toggle button.active{ background:var(--mustard); color:var(--ink);}

  .cats{ display:flex; gap:8px; padding:14px 16px 4px; overflow-x:auto; }
  .cat-pill{ flex:none; border:1px solid var(--line); background:#fff; padding:8px 14px; border-radius:999px; font-size:12.5px; font-weight:600; color:var(--ink-soft);}
  .cat-pill.active{ background:var(--pine); color:#fff; border-color:var(--pine); }

  .search{ margin:10px 16px; display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
  .search input{ border:none; outline:none; font-size:13.5px; width:100%; background:transparent; font-family:inherit;}

  .dish-list{ padding:6px 16px 90px; display:flex; flex-direction:column; gap:12px; }
  .dish-card{ display:flex; gap:12px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:10px; }
  .dish-photo{ width:clamp(56px, 18vw, 74px); height:clamp(56px, 18vw, 74px); max-width:74px; max-height:74px; border-radius:10px; flex:none; display:flex; align-items:center; justify-content:center; font-size:clamp(24px, 6vw, 30px); background:var(--paper); }
  .dish-info{ flex:1; min-width:0; }
  .dish-info h3{ font-size:15px; margin:0 0 3px; }
  .dish-info p{ font-size:12px; color:var(--ink-soft); margin:0 0 8px; line-height:1.4; }
  .dish-bottom{ display:flex; align-items:center; justify-content:space-between; }
  .price{ font-weight:700; font-size:13.5px; }
  .add-btn{ border:none; background:var(--pine); color:#fff; font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px; }
  .add-btn:active{ transform:scale(.96); }
  .sold-out{ opacity:.5; }
  .sold-out .add-btn{ background:#bbb; }
  .badge-pop{ display:inline-block; font-size:9px; font-weight:700; background:var(--tomato); color:#fff; padding:2px 6px; border-radius:6px; margin-left:6px; vertical-align:middle; letter-spacing:.03em;}

  .fab-cart{ position:fixed; bottom:86px; left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:448px; background:var(--tomato); color:#fff; border:none; border-radius:14px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:13.5px; box-shadow:0 10px 24px rgba(193,68,45,0.4); z-index:50; }

  .bottom-tabs{ display:flex; border-top:1px solid var(--line); background:#fff; position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; z-index:40; }
  .bottom-tabs button{ flex:1; border:none; background:transparent; padding:10px 4px 12px; font-size:10.5px; font-weight:600; color:var(--ink-soft); display:flex; flex-direction:column; align-items:center; gap:3px;}
  .bottom-tabs button.active{ color:var(--pine); }
  .bottom-tabs .ic{ font-size:17px; }

  .section-pad{ padding:16px; padding-bottom:90px;}
  .card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:14px; }

  /* cart */
  .cart-row{ display:flex; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
  .cart-row:last-child{ border-bottom:none; }
  .qty-ctrl{ display:flex; align-items:center; gap:8px; }
  .qty-ctrl button{ width:24px; height:24px; border-radius:7px; border:1px solid var(--line); background:var(--paper); font-weight:700; }
  .totals-row{ display:flex; justify-content:space-between; font-size:13.5px; padding:5px 0; }
  .totals-row.grand{ font-weight:700; font-size:15px; padding-top:10px; border-top:1px dashed var(--line); margin-top:6px; }
  .primary-btn{ width:100%; background:var(--tomato); color:#fff; border:none; padding:14px; border-radius:12px; font-weight:700; font-size:14px; margin-top:14px; }
  .primary-btn.ghost{ background:transparent; border:1.5px solid var(--pine); color:var(--pine); }
  .primary-btn:disabled{ background:#ccc; }

  /* checkout */
  .auth-option{ display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:10px; font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:10px; }
  .auth-option.google{ border-color:var(--pine); }
  .divider-or{ text-align:center; font-size:11px; color:var(--ink-soft); margin:14px 0; position:relative;}
  .divider-or:before,.divider-or:after{content:"";position:absolute;top:50%;width:40%;height:1px;background:var(--line);}
  .divider-or:before{left:0;} .divider-or:after{right:0;}
  .field{ margin-bottom:10px;}
  .field label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); display:block; margin-bottom:5px;}
  .field input{ width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line); font-size:13.5px; font-family:inherit; }

  /* ---- Signature element: printed kitchen ticket ---- */
  .ticket-wrap{ padding:6px 10px 30px; }
  .ticket{
    background: var(--paper-light);
    font-family:'Space Mono', monospace;
    padding:20px 18px 26px;
    position:relative;
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    animation: print-out .5s ease-out;
    transform-origin: top;
  }
  @keyframes print-out{ from{ transform: scaleY(0.2); opacity:0; } to{ transform:scaleY(1); opacity:1; } }
  .ticket:after{
    content:""; position:absolute; left:0; right:0; bottom:-9px; height:18px;
    background: linear-gradient(135deg, var(--paper-light) 50%, transparent 50%),
                linear-gradient(-135deg, var(--paper-light) 50%, transparent 50%);
    background-size: 16px 18px; background-position: bottom left;
    background-repeat: repeat-x;
  }
  .ticket h4{ margin:0 0 2px; font-size:13px; letter-spacing:.05em;}
  .ticket .tnum{ font-size:22px; font-weight:700; margin:6px 0; }
  .ticket .dash{ border:none; border-top:1px dashed var(--ink-soft); margin:10px 0; }
  .ticket .trow{ display:flex; justify-content:space-between; font-size:12px; margin:3px 0; }
  .status-track{ display:flex; justify-content:space-between; margin:16px 0 4px; position:relative;}
  .status-track:before{ content:""; position:absolute; top:9px; left:8%; right:8%; height:2px; background:var(--line); z-index:0;}
  .status-step{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;}
  .status-dot{ width:18px; height:18px; border-radius:50%; background:#fff; border:2px solid var(--line); }
  .status-step.done .status-dot{ background:var(--basil); border-color:var(--basil); }
  .status-step.now .status-dot{ background:var(--mustard); border-color:var(--mustard); box-shadow:0 0 0 4px rgba(227,164,49,0.25);}
  .status-step span{ font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; color:var(--ink-soft); text-align:center;}
  .status-step.done span, .status-step.now span{ color:var(--ink); }

  .info-row{ display:flex; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .info-row:last-child{border-bottom:none;}
  .info-row .ic{ width:20px; text-align:center; }
  .promo-banner{ background:linear-gradient(120deg, var(--mustard), var(--mustard-deep)); color:var(--ink); border-radius:12px; padding:12px 14px; margin:0 16px 4px; font-size:12.5px; font-weight:600; display:flex; gap:8px; align-items:center;}

  /* ================= ADMIN PANEL ================= */
  .admin-wrap{ display:none; min-height:100vh; }
  .admin-wrap.active{ display:flex; }
  .admin-nav{ width:220px; background:var(--pine-deep); color:var(--paper-light); flex:none; padding:26px 16px; }
  .admin-nav .brand{ font-family:'Fraunces',serif; font-size:19px; color:#fff; margin-bottom:2px;}
  .admin-nav .brand-sub{ font-size:11px; color:rgba(248,243,227,.5); margin-bottom:26px;}
  .admin-nav button{ display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent; border:none; color:rgba(248,243,227,.75); padding:11px 12px; border-radius:10px; font-size:13.5px; font-weight:600; margin-bottom:4px; }
  .admin-nav button.active{ background:rgba(255,255,255,0.08); color:#fff; }
  .admin-nav button .ic{width:18px;display:inline-block;}
  .admin-main{ flex:1; padding:30px 34px; background:var(--paper-light); }
  .admin-header{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; }
  .admin-header h2{ font-size:24px; margin:0 0 3px; }
  .admin-header p{ margin:0; color:var(--ink-soft); font-size:13px;}
  .stat-row{ display:flex; gap:14px; margin-bottom:24px; }
  .stat-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 18px; flex:1; }
  .stat-card .num{ font-size:24px; font-weight:700; font-family:'Fraunces',serif; }
  .stat-card .lbl{ font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }

  .rail{ display:flex; gap:16px; overflow-x:auto; padding-bottom:10px; }
  .rail .ticket{ min-width:230px; flex:none; }
  .rail .ticket .actions{ display:flex; gap:6px; margin-top:12px; }
  .rail .ticket .actions button{ flex:1; border:1px solid var(--ink); background:transparent; padding:7px; border-radius:7px; font-size:10.5px; font-weight:700; font-family:'Inter',sans-serif;}
  .rail .ticket .actions button.primary{ background:var(--pine); color:#fff; border-color:var(--pine);}

  table{ width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden;}
  th,td{ text-align:left; padding:11px 14px; font-size:13px; border-bottom:1px solid var(--line); }
  th{ background:var(--paper); font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft); }
  tr:last-child td{border-bottom:none;}
  .row-actions button{ border:none; background:transparent; font-weight:700; font-size:12px; color:var(--pine); margin-right:10px; }
  .row-actions button.danger{ color:var(--tomato); }
  .pill{ display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; }
  .pill.on{ background:rgba(76,122,93,0.15); color:var(--basil); }
  .pill.off{ background:rgba(193,68,45,0.12); color:var(--tomato); }
  .add-dish-btn{ background:var(--tomato); color:#fff; border:none; padding:10px 16px; border-radius:10px; font-weight:700; font-size:13px; }

  .modal-bg{ position:fixed; inset:0; background:rgba(21,44,34,0.55); display:none; align-items:center; justify-content:center; z-index:900; }
  .modal-bg.active{ display:flex; }
  .modal{ background:#fff; border-radius:16px; padding:24px; width:380px; max-width:90vw; max-height:85vh; overflow-y:auto; }
  .modal h3{ margin-top:0; }
  .modal .field select{ width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line); font-family:inherit; font-size:13.5px;}
  .modal-actions{ display:flex; gap:8px; margin-top:16px; }
  .modal-actions button{ flex:1; padding:11px; border-radius:10px; border:none; font-weight:700; font-size:13px;}
  .modal-actions .cancel{ background:var(--paper); }
  .modal-actions .save{ background:var(--pine); color:#fff; }

  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13px; z-index:1000; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  @media (max-width:768px){
    body{ overflow-x:hidden; }
    .stage{ min-height:100dvh; }
    .phone{
      width:100vw; max-width:none; min-height:100dvh; height:100dvh; border:none; border-radius:0; box-shadow:none;
    }
    .screen{ min-height:100dvh; height:100dvh; }
    .shell-switch{ top:10px; right:10px; }
    .app-header{ padding:28px 16px 14px; }
    .lang-toggle{ top:28px; right:16px; }
    .cats{ padding:12px 14px 4px; }
    .search{ margin:10px 14px; }
    .dish-list{ padding:6px 14px 110px; gap:10px; }
    .dish-card{ gap:10px; padding:10px; }
    .fab-cart{
      left:12px; right:12px; width:auto; max-width:none; transform:none; bottom:78px;
    }
    .bottom-tabs{ left:0; right:0; max-width:none; }
    .section-pad{ padding:14px 14px 100px; }
    .promo-banner{ margin:0 14px 4px; }
  }

  @media (max-width:760px){
    .admin-wrap.active{ flex-direction:column; }
    .admin-nav{ width:100%; display:flex; align-items:center; gap:8px; padding:14px 16px; overflow-x:auto;}
    .admin-nav .brand,.admin-nav .brand-sub{display:none;}
    .admin-nav button{ width:auto; white-space:nowrap; margin-bottom:0;}
    .admin-main{ padding:20px; }
  }
</style>
</head>
<body>

<div class="shell-switch">
  <button id="btnShellCustomer" class="active" onclick="setShell('customer')">Customer app</button>
  <button id="btnShellAdmin" onclick="setShell('admin')">Admin panel</button>
</div>

<!-- ============ CUSTOMER APP ============ -->
<div class="stage" id="customerStage">
  <div class="phone">
    <div class="screen" id="screen"></div>
  </div>
</div>

<!-- ============ ADMIN PANEL ============ -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-nav">
    <div class="brand">Osteria Bricco</div>
    <div class="brand-sub">Staff panel</div>
    <button data-page="orders" class="admin-nav-btn active" onclick="setAdminPage('orders')"><span class="ic">🎫</span> Live orders</button>
    <button data-page="menu" class="admin-nav-btn" onclick="setAdminPage('menu')"><span class="ic">📋</span> Menu manager</button>
    <button data-page="customers" class="admin-nav-btn" onclick="setAdminPage('customers')"><span class="ic">👥</span> Customers</button>
    <button data-page="promos" class="admin-nav-btn" onclick="setAdminPage('promos')"><span class="ic">🏷️</span> Promotions</button>
  </div>
  <div class="admin-main" id="adminMain"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ========================= DATA (in-memory) ========================= */
const STR = {

const session = {
  shell:'customer',
  lang:'en',
  page:'home',
  activeCat:'antipasti',
  search:'',
  cart:{}, // dishId -> qty
  user:null, // {name, phone, method}
  currentOrderId:null,
  adminPage:'orders',
};

let ticketCounter = 41;

/* ========================= HELPERS ========================= */
function t(key){ return STR[session.lang][key]; }
function fmt(n){ return '€'+n.toFixed(2); }
function dishName(d){ return session.lang==='it' ? d.it : d.en; }
function dishDesc(d){ return session.lang==='it' ? d.descIt : d.descEn; }
function catName(c){ return session.lang==='it' ? c.it : c.en; }
function cartCount(){ return Object.values(session.cart).reduce((a,b)=>a+b,0); }
function cartTotal(){
  return Object.entries(session.cart).reduce((sum,[id,qty])=>{
    const d = db.dishes.find(x=>x.id==id); return sum + (d? d.price*qty : 0);
  },0);
}
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1800);
}
function statusLabel(s){
  return s==='received'? t('received') : s==='preparing'? t('preparing') : t('ready');
}

/* ========================= SHELL SWITCH ========================= */
function setShell(which){
  session.shell = which;
  document.getElementById('btnShellCustomer').classList.toggle('active', which==='customer');
  document.getElementById('btnShellAdmin').classList.toggle('active', which==='admin');
  document.getElementById('customerStage').style.display = which==='customer' ? 'flex' : 'none';
  document.getElementById('adminWrap').classList.toggle('active', which==='admin');
  if(which==='admin') renderAdmin(); else renderCustomer();
}

/* ========================= CUSTOMER RENDER ========================= */
function setLang(l){ session.lang = l; renderCustomer(); }
function setPage(p){ session.page = p; renderCustomer(); }
function setCat(c){ session.activeCat = c; renderCustomer(); }

function addToCart(id){
  session.cart[id] = (session.cart[id]||0)+1;
  renderCustomer();
  showToast(session.lang==='it' ? 'Aggiunto al carrello' : 'Added to cart');
}
function changeQty(id, delta){
  const cur = session.cart[id]||0;
  const next = cur+delta;
  if(next<=0) delete session.cart[id]; else session.cart[id]=next;
  renderCustomer();
}

function renderCustomer(){
  const s = document.getElementById('screen');
  let html = '';

  if(session.page==='home' || session.page==='menu'){
    html += headerBlock();
    html += `<div class="cats">` + db.categories.map(c=>
      `<button class="cat-pill ${session.activeCat===c.id?'active':''}" onclick="setCat('${c.id}')">${catName(c)}</button>`
    ).join('') + `</div>`;
    html += `<div class="search"><span>🔎</span><input placeholder="${t('search')}" oninput="session.search=this.value; renderDishesOnly();" value="${session.search}"></div>`;
    if(session.page==='home'){
      const active = db.promotions.find(p=>p.active);
      if(active) html += `<div class="promo-banner">🏷️ <b>${active.title}</b> — ${active.desc}</div>`;
    }
    html += `<div id="dishListWrap">` + dishListHtml() + `</div>`;
    if(cartCount()>0){
      html += `<button class="fab-cart" onclick="setPage('cart')"><span>🛒 ${cartCount()} ${t('itemsWord')}</span><span>${fmt(cartTotal())} → </span></button>`;
    }
  }
  else if(session.page==='cart'){
    html += headerBlock(true);
    html += `<div class="section-pad">`;
    const entries = Object.entries(session.cart);
    if(entries.length===0){
      html += `<div class="card" style="text-align:center; padding:30px 14px;">
        <div style="font-size:34px;">🧺</div>
        <p style="color:var(--ink-soft); font-size:13px; margin:10px 0 16px;">${t('empty')}</p>
        <button class="primary-btn ghost" onclick="setPage('home')">${t('browseMenu')}</button>
      </div>`;
    } else {
      html += `<div class="card">`;
      entries.forEach(([id,qty])=>{
        const d = db.dishes.find(x=>x.id==id);
        html += `<div class="cart-row">
          <div class="dish-photo" style="width:46px;height:46px;font-size:20px;">${d.photo}</div>
          <div style="flex:1;">
            <div style="font-weight:600; font-size:13.5px;">${dishName(d)}</div>
            <div style="font-size:11.5px; color:var(--ink-soft);">${fmt(d.price)} ${t('each')}</div>
          </div>
          <div class="qty-ctrl">
            <button onclick="changeQty(${d.id},-1)">−</button>
            <span style="font-weight:700; min-width:14px; text-align:center; display:inline-block;">${qty}</span>
            <button onclick="changeQty(${d.id},1)">+</button>
          </div>
        </div>`;
      });
      html += `</div>`;
      html += `<div class="card" style="margin-top:12px;">
        <div class="totals-row"><span>${t('subtotal')}</span><span>${fmt(cartTotal())}</span></div>
        <div class="totals-row grand"><span>${t('total')}</span><span>${fmt(cartTotal())}</span></div>
      </div>`;
      html += `<button class="primary-btn" onclick="setPage('checkout')">${t('checkout')} · ${fmt(cartTotal())}</button>`;
    }
    html += `</div>`;
  }
  else if(session.page==='checkout'){
    html += headerBlock(true);
    html += `<div class="section-pad">`;
    if(!session.user){
      html += `<h3 style="margin-top:0;">${t('yourOrder')}</h3>`;
      html += `<button class="auth-option google" onclick="signInGoogle()">🔵 ${t('signInGoogle')}</button>`;
      html += `<div class="divider-or">${t('or')}</div>`;
      html += `<div class="card">
        <div class="field"><label>${t('name')}</label><input id="guestName" placeholder="Marco Rossi"></div>
        <div class="field"><label>${t('phone')}</label><input id="guestPhone" placeholder="+39 333 1234567"></div>
        <button class="primary-btn ghost" style="margin-top:4px;" onclick="continueGuest()">${t('guest')}</button>
      </div>`;
    } else {
      html += `<div class="card" style="display:flex; gap:10px; align-items:center;">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--pine);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${session.user.name.charAt(0)}</div>
        <div>
          <div style="font-weight:700; font-size:13.5px;">${session.user.name}</div>
          <div style="font-size:11.5px; color:var(--ink-soft);">${session.user.phone} · ${session.user.method==='google'?'Google':'Guest'}</div>
        </div>
      </div>`;
      html += `<div class="card" style="margin-top:12px;">`;
      Object.entries(session.cart).forEach(([id,qty])=>{
        const d = db.dishes.find(x=>x.id==id);
        html += `<div class="trow" style="display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;"><span>${qty}× ${dishName(d)}</span><span>${fmt(d.price*qty)}</span></div>`;
      });
      html += `<div class="totals-row grand"><span>${t('total')}</span><span>${fmt(cartTotal())}</span></div>
      </div>`;
      html += `<button class="primary-btn" onclick="placeOrder()">${t('confirm')} · ${fmt(cartTotal())}</button>`;
    }
    html += `</div>`;
  }
  else if(session.page==='tracking'){
    const order = db.orders.find(o=>o.id===session.currentOrderId);
    html += headerBlock(true);
    html += `<div class="ticket-wrap">`;
    if(order) html += ticketHtml(order, true);
    html += `<button class="primary-btn ghost" onclick="setPage('home')">${session.lang==='it'?'Torna al menu':'Back to menu'}</button>`;
    html += `</div>`;
  }
  else if(session.page==='info'){
    html += headerBlock(true);
    html += `<div class="section-pad">
      <div class="card">
        <div class="info-row"><span class="ic">🕐</span><div><b>${t('hours')}</b><br><span style="color:var(--ink-soft);">${db.restaurant.hours}</span></div></div>
        <div class="info-row"><span class="ic">📍</span><div><b>${t('location')}</b><br><span style="color:var(--ink-soft);">${db.restaurant.address}</span></div></div>
        <div class="info-row"><span class="ic">☎️</span><div><b>${t('contact')}</b><br><span style="color:var(--ink-soft);">${db.restaurant.phone}</span></div></div>
        <div class="info-row"><span class="ic">🌐</span><div><b>${t('languages')}</b><br>
          <span style="color:var(--ink-soft);">EN / IT</span>
        </div></div>
      </div>
    </div>`;
  }

  // bottom tabs (hidden on tracking to keep focus)
  if(session.page!=='tracking'){
    html += `<div class="bottom-tabs">
      <button class="${['home','menu'].includes(session.page)?'active':''}" onclick="setPage('home')"><span class="ic">🍽️</span>${t('homeTab')}</button>
      <button class="${session.page==='cart'?'active':''}" onclick="setPage('cart')"><span class="ic">🛒</span>${t('cartTab')}${cartCount()?` (${cartCount()})`:''}</button>
      <button class="${session.page==='info'?'active':''}" onclick="setPage('info')"><span class="ic">ℹ️</span>${t('infoTab')}</button>
    </div>`;
  }

  s.innerHTML = html;
  window.scrollTo(0,0);
}

function headerBlock(back){
  const titleMap = {home:t('welcome')+' '+db.restaurant.name, menu:t('menu'), cart:t('cart'), checkout:t('checkout'), tracking:t('track'), info:t('info')};
  const title = session.page==='home' ? db.restaurant.name : titleMap[session.page];
  return `<div class="app-header">
    <div class="eyebrow">${session.page==='home'?t('tagline'):'Osteria Bricco'}</div>
    <h1>${title}</h1>
    ${session.page==='home' ? `<div class="sub">${db.restaurant.hours}</div>` : ''}
    <div class="lang-toggle">
      <button class="${session.lang==='en'?'active':''}" onclick="setLang('en')">EN</button>
      <button class="${session.lang==='it'?'active':''}" onclick="setLang('it')">IT</button>
    </div>
  </div>`;
}

function dishListHtml(){
  const dishes = db.dishes.filter(d=> d.cat===session.activeCat &&
    (session.search==='' || dishName(d).toLowerCase().includes(session.search.toLowerCase())));
  if(dishes.length===0){
    return `<div style="padding:30px; text-align:center; color:var(--ink-soft); font-size:13px;">${session.lang==='it'?'Nessun piatto trovato.':'No dishes found.'}</div>`;
  }
  return `<div class="dish-list">` + dishes.map(d=>`
    <div class="dish-card ${!d.available?'sold-out':''}">
      <div class="dish-photo">${d.photo}</div>
      <div class="dish-info">
        <h3>${dishName(d)} ${d.popular?`<span class="badge-pop">${t('popular')}</span>`:''}</h3>
        <p>${dishDesc(d)}</p>
        <div class="dish-bottom">
          <span class="price">${fmt(d.price)}</span>
          ${d.available
            ? `<button class="add-btn" onclick="addToCart(${d.id})">${t('addToCart')}</button>`
            : `<button class="add-btn" disabled>${t('soldOut')}</button>`}
        </div>
      </div>
    </div>
  `).join('') + `</div>`;
}
function renderDishesOnly(){
  document.getElementById('dishListWrap').innerHTML = dishListHtml();
  if(cartCount()===0){} // fab handled on full render only; acceptable for search interaction
}

function signInGoogle(){
  session.user = { name:'Giulia Bianchi', phone:'+39 347 555 0199', method:'google' };
  renderCustomer();
  showToast(session.lang==='it' ? 'Accesso con Google effettuato' : 'Signed in with Google');
}
function continueGuest(){
  const name = document.getElementById('guestName').value.trim();
  const phone = document.getElementById('guestPhone').value.trim();
  if(!name || !phone){ showToast(session.lang==='it' ? 'Inserisci nome e telefono' : 'Enter name and phone'); return; }
  session.user = { name, phone, method:'guest' };
  renderCustomer();
}
function placeOrder(){
  const items = Object.entries(session.cart).map(([id,qty])=>({dishId:Number(id), qty}));
  const order = {
    id: nextId++,
    ticketNo: ticketCounter++,
    name: session.user.name,
    phone: session.user.phone,
    method: session.user.method,
    items,
    status:'received',
    total: cartTotal(),
    time: new Date(),
  };
  db.orders.unshift(order);
  session.currentOrderId = order.id;
  session.cart = {};
  session.page = 'tracking';
  renderCustomer();
  // simulate kitchen progress
  setTimeout(()=>{ advanceStatus(order.id,'preparing'); }, 6000);
  setTimeout(()=>{ advanceStatus(order.id,'ready'); }, 13000);
}
function advanceStatus(orderId, status){
  const o = db.orders.find(x=>x.id===orderId);
  if(!o) return;
  const flow = ['received','preparing','ready'];
  if(flow.indexOf(status) <= flow.indexOf(o.status)) return;
  o.status = status;
  if(session.shell==='customer' && session.page==='tracking' && session.currentOrderId===orderId) renderCustomer();
  if(session.shell==='admin') renderAdmin();
}

function ticketHtml(order, showTrack, extraHtml){
  const steps = ['received','preparing','ready'];
  const idx = steps.indexOf(order.status);
  let html = `<div class="ticket">
    <h4 class="mono">${t('ticketNo')} №</h4>
    <div class="tnum">#${order.ticketNo}</div>
    <div style="font-size:11px; color:var(--ink-soft);">${order.name} · ${order.phone}</div>
    <hr class="dash">`;
  order.items.forEach(it=>{
    const d = db.dishes.find(x=>x.id===it.dishId);
    html += `<div class="trow"><span>${it.qty}× ${d?dishName(d):'—'}</span><span>${fmt((d?d.price:0)*it.qty)}</span></div>`;
  });
  html += `<hr class="dash">
    <div class="trow" style="font-weight:700;"><span>${t('total')}</span><span>${fmt(order.total)}</span></div>`;
  if(showTrack){
    html += `<div class="status-track">
      ${steps.map((st,i)=>`<div class="status-step ${i<idx?'done':''} ${i===idx?'now':''}">
        <div class="status-dot"></div><span>${statusLabel(st)}</span>
      </div>`).join('')}
    </div>`;
  } else {
    html += `<div style="margin-top:10px; font-size:11px; text-align:center; text-transform:uppercase; letter-spacing:.05em; font-weight:700;">${statusLabel(order.status)}</div>`;
  }
  if(extraHtml) html += extraHtml;
  html += `</div>`;
  return html;
}

/* ========================= ADMIN RENDER ========================= */
function setAdminPage(p){
  session.adminPage = p;
  document.querySelectorAll('.admin-nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.page===p));
  renderAdmin();
}

function renderAdmin(){
  const m = document.getElementById('adminMain');
  if(session.adminPage==='orders') m.innerHTML = adminOrdersHtml();
  else if(session.adminPage==='menu') m.innerHTML = adminMenuHtml();
  else if(session.adminPage==='customers') m.innerHTML = adminCustomersHtml();
  else if(session.adminPage==='promos') m.innerHTML = adminPromosHtml();
}

function adminOrdersHtml(){
  const counts = {received:0,preparing:0,ready:0};
  db.orders.forEach(o=>counts[o.status]++);
  let html = `<div class="admin-header"><div><h2>Live orders</h2><p>Orders update in real time as the kitchen works through them.</p></div></div>`;
  html += `<div class="stat-row">
    <div class="stat-card"><div class="num">${counts.received}</div><div class="lbl">Received</div></div>
    <div class="stat-card"><div class="num">${counts.preparing}</div><div class="lbl">Preparing</div></div>
    <div class="stat-card"><div class="num">${counts.ready}</div><div class="lbl">Ready for pickup</div></div>
    <div class="stat-card"><div class="num">${db.orders.length}</div><div class="lbl">Total today</div></div>
  </div>`;
  if(db.orders.length===0){
    html += `<div class="card" style="text-align:center; color:var(--ink-soft); padding:40px;">No orders yet — place one from the customer app to see it appear here.</div>`;
  } else {
    html += `<div class="rail">` + db.orders.map(o=>{
      let actionBtns = '';
      if(o.status==='received') actionBtns = `<button class="primary" onclick="advanceStatus(${o.id},'preparing')">Start preparing</button>`;
      else if(o.status==='preparing') actionBtns = `<button class="primary" onclick="advanceStatus(${o.id},'ready')">Mark ready</button>`;
      else actionBtns = `<button disabled style="opacity:.5;">Completed</button>`;
      return ticketHtml(o, false, `<div class="actions">${actionBtns}</div>`);
    }).join('') + `</div>`;
  }
  return html;
}

function adminMenuHtml(){
  let html = `<div class="admin-header">
    <div><h2>Menu manager</h2><p>Add dishes, edit prices, and toggle availability.</p></div>
    <button class="add-dish-btn" onclick="openDishModal()">+ Add dish</button>
  </div>`;
  html += `<table><thead><tr><th></th><th>Dish</th><th>Category</th><th>Price</th><th>Status</th><th></th></tr></thead><tbody>`;
  db.dishes.forEach(d=>{
    const cat = db.categories.find(c=>c.id===d.cat);
    html += `<tr>
      <td style="font-size:20px;">${d.photo}</td>
      <td><b>${d.en}</b><br><span style="color:var(--ink-soft); font-size:11.5px;">${d.it}</span></td>
      <td>${cat?cat.en:''}</td>
      <td>${fmt(d.price)}</td>
      <td><span class="pill ${d.available?'on':'off'}">${d.available?'Available':'Sold out'}</span></td>
      <td class="row-actions">
        <button onclick="openDishModal(${d.id})">Edit</button>
        <button onclick="toggleAvailability(${d.id})">${d.available?'Mark sold out':'Mark available'}</button>
        <button class="danger" onclick="deleteDish(${d.id})">Delete</button>
      </td>
    </tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function toggleAvailability(id){
  const d = db.dishes.find(x=>x.id===id); d.available = !d.available; renderAdmin(); renderCustomer();
}
function deleteDish(id){
  db.dishes = db.dishes.filter(x=>x.id!==id); renderAdmin(); renderCustomer();
  showToast('Dish deleted');
}
function openDishModal(id){
  const d = id ? db.dishes.find(x=>x.id===id) : null;
  const bg = document.getElementById('modalBg');
  document.getElementById('modalContent').innerHTML = `
    <h3>${d?'Edit dish':'Add dish'}</h3>
    <div class="field"><label>Name (EN)</label><input id="mEn" value="${d?d.en:''}"></div>
    <div class="field"><label>Name (IT)</label><input id="mIt" value="${d?d.it:''}"></div>
    <div class="field"><label>Description (EN)</label><input id="mDescEn" value="${d?d.descEn:''}"></div>
    <div class="field"><label>Description (IT)</label><input id="mDescIt" value="${d?d.descIt:''}"></div>
    <div class="field"><label>Category</label><select id="mCat">${db.categories.map(c=>`<option value="${c.id}" ${d&&d.cat===c.id?'selected':''}>${c.en}</option>`).join('')}</select></div>
    <div class="field"><label>Price (€)</label><input id="mPrice" type="number" step="0.5" value="${d?d.price:''}"></div>
    <div class="field"><label>Emoji photo</label><input id="mPhoto" value="${d?d.photo:'🍽️'}"></div>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveDish(${d?d.id:'null'})">Save</button>
    </div>`;
  bg.classList.add('active');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('active'); }
function saveDish(id){
  const en = document.getElementById('mEn').value.trim();
  const it = document.getElementById('mIt').value.trim();
  const descEn = document.getElementById('mDescEn').value.trim();
  const descIt = document.getElementById('mDescIt').value.trim();
  const cat = document.getElementById('mCat').value;
  const price = parseFloat(document.getElementById('mPrice').value)||0;
  const photo = document.getElementById('mPhoto').value.trim()||'🍽️';
  if(!en || !price){ showToast('Name and price are required'); return; }
  if(id){
    const d = db.dishes.find(x=>x.id===id);
    Object.assign(d,{en,it,descEn,descIt,cat,price,photo});
  } else {
    db.dishes.push({id:nextId++, cat, en, it, descEn, descIt, price, photo, available:true, popular:false});
  }
  closeModal(); renderAdmin(); renderCustomer();
  showToast('Menu updated');
}

function adminCustomersHtml(){
  const map = {};
  db.orders.forEach(o=>{
    const key = o.phone;
    if(!map[key]) map[key] = {name:o.name, phone:o.phone, method:o.method, orders:0, spent:0};
    map[key].orders++; map[key].spent += o.total;
  });
  const list = Object.values(map);
  let html = `<div class="admin-header"><div><h2>Customers</h2><p>Everyone who has ordered, built automatically from order history.</p></div></div>`;
  if(list.length===0){
    html += `<div class="card" style="text-align:center; color:var(--ink-soft); padding:40px;">No customers yet.</div>`;
  } else {
    html += `<table><thead><tr><th>Name</th><th>Phone</th><th>Sign-in</th><th>Orders</th><th>Total spent</th></tr></thead><tbody>`;
    list.forEach(c=>{
      html += `<tr><td><b>${c.name}</b></td><td>${c.phone}</td><td>${c.method==='google'?'Google':'Guest'}</td><td>${c.orders}</td><td>${fmt(c.spent)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  return html;
}

function adminPromosHtml(){
  let html = `<div class="admin-header">
    <div><h2>Promotions</h2><p>Create special offers shown on the customer app's home screen.</p></div>
    <button class="add-dish-btn" onclick="openPromoModal()">+ New promotion</button>
  </div>`;
  html += `<table><thead><tr><th>Title</th><th>Details</th><th>Status</th><th></th></tr></thead><tbody>`;
  db.promotions.forEach(p=>{
    html += `<tr><td><b>${p.title}</b></td><td>${p.desc}</td><td><span class="pill ${p.active?'on':'off'}">${p.active?'Active':'Inactive'}</span></td>
      <td class="row-actions"><button onclick="togglePromo(${p.id})">${p.active?'Deactivate':'Activate'}</button><button class="danger" onclick="deletePromo(${p.id})">Delete</button></td></tr>`;
  });
  html += `</tbody></table>`;
  return html;
}
function togglePromo(id){
  db.promotions.forEach(p=>{ if(p.id===id) p.active=!p.active; else p.active=false; });
  renderAdmin(); renderCustomer();
}
function deletePromo(id){ db.promotions = db.promotions.filter(p=>p.id!==id); renderAdmin(); }
function openPromoModal(){
  document.getElementById('modalContent').innerHTML = `
    <h3>New promotion</h3>
    <div class="field"><label>Title</label><input id="pTitle"></div>
    <div class="field"><label>Details</label><input id="pDesc"></div>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="savePromo()">Save</button>
    </div>`;
  document.getElementById('modalBg').classList.add('active');
}
function savePromo(){
  const title = document.getElementById('pTitle').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  if(!title){ showToast('Title required'); return; }
  db.promotions.push({id:nextId++, title, desc, active:false});
  closeModal(); renderAdmin();
}

/* ========================= INIT ========================= */
renderCustomer();
</script>
</body>
</html>
